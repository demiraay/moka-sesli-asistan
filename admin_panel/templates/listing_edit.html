{% extends "base.html" %}

{% block title %}{{ listing.inventory_id }} Duzenle — {{ panel_project }}{% endblock %}

{% block content %}
  <div class="page-header detail-header">
    <div>
      <h1>{{ listing.block_id }}-{{ listing.door_number }} · Duzenle</h1>
      <p>{{ listing.inventory_id }} ilan bilgilerini guncelleyin.</p>
    </div>
    <a class="button secondary" href="{{ url_for('listing_detail', inventory_id=listing.inventory_id) }}">&larr; Ilana don</a>
  </div>

  <form class="edit-form" method="post">
    <label>Blok
      <select name="block_id" required>
        {% for block in block_options %}
          <option value="{{ block.block_id }}" {% if block.block_id == listing.block_id %}selected{% endif %}>
            {{ block.block_id }}{% if block.type %} — {{ block.type }}{% endif %}
          </option>
        {% endfor %}
      </select>
    </label>
    <label>Kat
      <input type="number" name="floor" value="{{ listing.floor }}" required>
    </label>
    <label>Kapi numarasi
      <input type="text" name="door_number" value="{{ listing.door_number }}" required>
    </label>
    <label>Daire tipi
      <select name="flat_type_id" required>
        {% for option in flat_options %}
          <option value="{{ option.flat_type_id }}" {% if option.flat_type_id == listing.flat_type_id %}selected{% endif %}>
            {{ option.label }}
          </option>
        {% endfor %}
      </select>
    </label>
    <label>Durum
      <select name="status" required>
        {% for value in ["available", "reserved", "sold"] %}
          <option value="{{ value }}" {% if value == listing.status %}selected{% endif %}>{{ value | status_tr }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Cephe
      <select name="direction" required>
        {% for value in direction_options %}
          <option value="{{ value }}" {% if value == listing.direction %}selected{% endif %}>{{ value | direction_tr }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Liste fiyati (TL)
      <input type="text" name="list_price_try" id="price-input" inputmode="numeric"
             value="{{ listing.price.list_price_try or 0 }}" required>
      <span class="cell-sub" id="price-preview"></span>
    </label>
    <label>KDV dahil
      <select name="vat_included">
        <option value="true" {% if listing.price.vat_included %}selected{% endif %}>Evet</option>
        <option value="false" {% if not listing.price.vat_included %}selected{% endif %}>Hayir</option>
      </select>
    </label>
    <label>Gecerlilik tarihi
      <input type="date" name="valid_until" value="{{ listing.price.valid_until or '' }}">
    </label>
    <label>Gunes seviyesi
      <select name="sun_exposure">
        {% for value in ["high", "medium", "low", "none"] %}
          <option value="{{ value }}" {% if value == listing.sunlight.sun_exposure %}selected{% endif %}>{{ value | sun_tr }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Gunluk gunes saati
      <input type="text" name="sun_hours_per_day" value="{{ listing.sunlight.sun_hours_per_day or '' }}">
    </label>
    <label>Gunes / cephe notu
      <textarea name="description" rows="3" placeholder="Or: Gun boyu gunes alan, aydinlik daire">{{ listing.sunlight.description or '' }}</textarea>
    </label>
    <label>Ilan aciklamasi
      <textarea name="listing_description" rows="4" placeholder="Daireye ozel satis notu — AI asistan da bu metni musteriye anlatirken kullanir">{{ listing.description or '' }}</textarea>
    </label>
    <div class="form-actions">
      <button class="button" type="submit">Kaydet</button>
      <a class="button secondary" href="{{ url_for('listing_detail', inventory_id=listing.inventory_id) }}">Vazgec</a>
    </div>
  </form>

  <script>
  (function () {
    var input = document.getElementById("price-input");
    var preview = document.getElementById("price-preview");
    function refresh() {
      var digits = input.value.replace(/[^\d]/g, "");
      input.value = digits;
      preview.textContent = digits
        ? Number(digits).toLocaleString("tr-TR") + " TL"
        : "";
    }
    input.addEventListener("input", refresh);
    refresh();
  })();
  </script>
{% endblock %}
